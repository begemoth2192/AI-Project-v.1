<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VOS — SelfArchitect. Understand yourself. Improve your life." />
  <title>VOS — SelfArchitect</title>

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><circle cx='30' cy='30' r='28' fill='none' stroke='%23D4B896' stroke-width='2'/><path d='M20 20 L30 42 L40 20' fill='none' stroke='%23D4B896' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='30' cy='17' r='2.5' fill='%23D4B896'/></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- React 18 + ReactDOM (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone — transforms JSX in the browser, no build step needed -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0C2340;
      color: #1A1A1A;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    input:focus, textarea:focus { outline: none; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInScale { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes breathe { 0%,100%{box-shadow:0 0 20px rgba(12,35,64,.3)} 50%{box-shadow:0 0 40px rgba(12,35,64,.5)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes revealGlow { 0%{opacity:0;filter:blur(20px);transform:scale(.5)} 60%{opacity:1;filter:blur(5px);transform:scale(1.1)} 100%{opacity:1;filter:blur(0);transform:scale(1)} }
    @keyframes typeDots { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
    @keyframes bubbleFloat { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-8px)} }
    @keyframes ringPulse { 0%{box-shadow:0 0 0 0 rgba(0,136,204,.4)} 70%{box-shadow:0 0 0 20px rgba(0,136,204,0)} 100%{box-shadow:0 0 0 0 rgba(0,136,204,0)} }
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes bubbleFadeIn { from{opacity:0;transform:translateY(30px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes bubbleFadeOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-20px) scale(.9)} }
    @keyframes orbitDot { 0%{transform:rotate(0deg) translateX(32px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(32px) rotate(-360deg)} }
    .fade-in { animation: fadeIn .5s ease-out forwards; }

    /* Loading splash */
    #loading {
      position: fixed; inset: 0; background: #0C2340;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
      transition: opacity .5s ease;
    }
    #loading .ring {
      width: 52px; height: 52px;
      border: 3px solid transparent;
      border-top: 3px solid #D4B896;
      border-right: 3px solid #9B59E8;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    #loading p { color: rgba(255,255,255,.35); font-size: 13px; letter-spacing: 1px; }
  </style>
</head>
<body>

  <!-- Loading splash (visible while Babel compiles the JSX) -->
  <div id="loading">
    <div class="ring"></div>
    <p>Loading VOS...</p>
  </div>

  <!-- React root -->
  <div id="root" style="height:100vh;width:100vw;overflow:hidden;"></div>

  <!-- App — Babel transforms JSX on the fly, no build step required -->
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <!-- Dismiss loading splash after app renders -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var el = document.getElementById('loading');
        if (el) { el.style.opacity = '0'; setTimeout(function () { el.remove(); }, 500); }
      }, 900);
    });
  </script>

</body>
</html>
